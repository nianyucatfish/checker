name: Build draft release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer without v (for example 1.2.3)"
        required: true
        type: string
      tag:
        description: "Draft release tag (blank means v<version>)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: draft-release-${{ github.ref }}-${{ inputs.tag || inputs.version }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      target_sha: ${{ steps.release.outputs.target_sha }}
    steps:
      - name: Resolve and validate release identity
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG: ${{ inputs.tag }}
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          semver='[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?'
          if [[ "$EVENT_NAME" == "push" ]]; then
            tag="$REF_NAME"
            [[ "$tag" =~ ^v${semver}$ ]] || { echo "Tag must be v<SemVer>: $tag" >&2; exit 1; }
            version="${tag#v}"
          else
            version="$INPUT_VERSION"
            [[ "$version" =~ ^${semver}$ ]] || { echo "Version must be SemVer without v: $version" >&2; exit 1; }
            tag="${INPUT_TAG:-v$version}"
            [[ "$tag" == "v$version" ]] || { echo "Tag must match version exactly (v$version): $tag" >&2; exit 1; }
          fi
          printf 'version=%s\ntag=%s\ntarget_sha=%s\n' "$version" "$tag" "$TARGET_SHA" >> "$GITHUB_OUTPUT"

  windows-x64:
    needs: prepare
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            sidecar/requirements.txt
            sidecar/requirements-dev.txt
      - name: Test sidecar
        run: |
          python -m pip install -r sidecar/requirements.txt -r sidecar/requirements-dev.txt
          python -m pytest sidecar/tests
      - name: Install and test Electron app
        working-directory: app
        run: |
          npm ci
          npm test
          npm run typecheck
      - name: Prepare embedded Python runtime
        run: node scripts/prepare-runtime.mjs
      - name: Verify staged package content
        run: node scripts/verify-package.mjs
      - name: Build Windows portable ZIP
        working-directory: app
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          npm exec vite build
          npm exec electron-builder -- --config electron-builder.yml --config.extraMetadata.version=$env:RELEASE_VERSION --win zip --x64 --publish never
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: app/release/Audio QC-${{ needs.prepare.outputs.version }}-windows-x64-portable.zip
          if-no-files-found: error
          retention-days: 14

  macos:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            uname: x86_64
          - arch: arm64
            runner: macos-15
            uname: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Assert native runner architecture
        shell: bash
        run: test "$(uname -m)" = "${{ matrix.uname }}"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            sidecar/requirements.txt
            sidecar/requirements-dev.txt
      - name: Test sidecar
        run: |
          python -m pip install -r sidecar/requirements.txt -r sidecar/requirements-dev.txt
          python -m pytest sidecar/tests
      - name: Install and test Electron app
        working-directory: app
        run: |
          npm ci
          npm test
          npm run typecheck
      - name: Prepare embedded Python runtime and DMG background
        run: |
          node scripts/prepare-runtime.mjs
          node scripts/verify-package.mjs
          node scripts/render-dmg-background.mjs
      - name: Select signed or unsigned build
        id: signing
        env:
          CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$CERTIFICATE" && -n "$CERTIFICATE_PASSWORD" && -n "$APPLE_ID_SECRET" && -n "$APPLE_PASSWORD_SECRET" && -n "$APPLE_TEAM_SECRET" ]]; then
            {
              echo "signed=true"
              echo "MAC_ARTIFACT_SUFFIX=-signed-notarized"
              echo "CSC_LINK=$CERTIFICATE"
              echo "CSC_KEY_PASSWORD=$CERTIFICATE_PASSWORD"
              echo "APPLE_ID=$APPLE_ID_SECRET"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_PASSWORD_SECRET"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_SECRET"
            } >> "$GITHUB_ENV"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "signed=false"
              echo "MAC_ARTIFACT_SUFFIX=-unsigned"
              echo "CSC_IDENTITY_AUTO_DISCOVERY=false"
            } >> "$GITHUB_ENV"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "Apple signing/notarization secrets are absent or incomplete; producing an explicitly unsigned DMG."
          fi
      - name: Build native macOS DMG and update ZIP
        working-directory: app
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          SIGNED_BUILD: ${{ steps.signing.outputs.signed }}
        shell: bash
        run: |
          set -euo pipefail
          npm exec vite build
          # Build the update ZIP before the installer DMG. On macos-15-intel, hdiutil can
          # transiently leave the DMG device busy; retry only the installer build.
          signing=(--config.mac.notarize=false)
          if [[ "$SIGNED_BUILD" == "true" ]]; then
            signing=(--config.mac.notarize=true)
          fi
          npm exec electron-builder -- --config electron-builder.yml --config.extraMetadata.version="$RELEASE_VERSION" --mac zip --${{ matrix.arch }} --publish never "${signing[@]}"
          for attempt in 1 2 3; do
            rm -f "release/Audio QC-$RELEASE_VERSION-macos-${{ matrix.arch }}-"*.dmg{,.blockmap}
            if npm exec electron-builder -- --config electron-builder.yml --config.extraMetadata.version="$RELEASE_VERSION" --mac dmg --${{ matrix.arch }} --publish never "${signing[@]}"; then
              break
            fi
            [[ "$attempt" == 3 ]] && exit 1
            echo "macOS DMG build attempt $attempt failed; retrying..."
          done
      - name: Smoke-test native macOS artifacts
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: node scripts/smoke-macos-package.mjs "$RELEASE_VERSION" "${{ matrix.arch }}"
      - name: Validate signed and notarized image
        if: steps.signing.outputs.signed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          dmg="app/release/Audio QC-${{ needs.prepare.outputs.version }}-macos-${{ matrix.arch }}-signed-notarized.dmg"
          xcrun stapler validate "$dmg"
          mount="$(mktemp -d)"
          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount"
          trap 'hdiutil detach "$mount"' EXIT
          codesign --verify --deep --strict --verbose=2 "$mount/Audio QC.app"
          spctl --assess --type execute --verbose=4 "$mount/Audio QC.app"
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: |
            app/release/Audio QC-${{ needs.prepare.outputs.version }}-macos-${{ matrix.arch }}-*.dmg
            app/release/Audio QC-${{ needs.prepare.outputs.version }}-macos-${{ matrix.arch }}-*.zip
          if-no-files-found: error
          retention-days: 14

  draft-release:
    needs: [prepare, windows-x64, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Validate assets, checksums, and release notes
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -maxdepth 1 -type f | sort)
          [[ ${#files[@]} -eq 5 ]] || { printf 'Expected exactly 5 release assets, got:\n%s\n' "${files[*]}" >&2; exit 1; }
          compgen -G "release-assets/Audio QC-$VERSION-windows-x64-portable.zip" >/dev/null
          compgen -G "release-assets/Audio QC-$VERSION-macos-x64-*.dmg" >/dev/null
          compgen -G "release-assets/Audio QC-$VERSION-macos-x64-*.zip" >/dev/null
          compgen -G "release-assets/Audio QC-$VERSION-macos-arm64-*.dmg" >/dev/null
          compgen -G "release-assets/Audio QC-$VERSION-macos-arm64-*.zip" >/dev/null
          (cd release-assets && sha256sum * > SHA256SUMS.txt)
          unsigned=false
          compgen -G 'release-assets/*-unsigned.dmg' >/dev/null && unsigned=true
          {
            echo "# Audio QC $VERSION"
            echo
            echo "Draft build from commit \`$TARGET_SHA\`. This release remains a draft until a maintainer reviews and publishes it."
            echo
            echo "## Artifacts"
            for file in "${files[@]}"; do echo "- \`$(basename "$file")\`"; done
            echo "- \`SHA256SUMS.txt\`"
            echo
            echo "## Offline update integrity"
            echo
            echo "The update ZIP manifests are unsigned drafts. Their per-file SHA-256 hashes detect corruption but are integrity-only and do not provide an authentic signature or prove publisher identity."
            if [[ "$unsigned" == true ]]; then
              echo
              echo "## macOS signing status"
              echo
              echo "Files ending in \`-unsigned.dmg\` are not Apple-signed or notarized because the complete Apple secret set was unavailable. Gatekeeper may block first launch; verify \`SHA256SUMS.txt\` and use Finder's Open action only if you trust the artifact."
            else
              echo
              echo "Both macOS DMGs were signed, notarized, and validated during the workflow."
            fi
          } > release-notes.md
      - name: Create or update one draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --json isDraft --jq '.isDraft' > existing.txt 2>/dev/null; then
            [[ "$(<existing.txt)" == "true" ]] || { echo "Refusing to modify published release $TAG" >&2; exit 1; }
            gh release edit "$TAG" --draft --notes-file release-notes.md
          else
            gh release create "$TAG" --draft --target "$TARGET_SHA" --title "Audio QC $TAG" --notes-file release-notes.md
          fi
          gh release upload "$TAG" release-assets/* --clobber
