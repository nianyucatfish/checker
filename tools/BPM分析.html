<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPM 分析</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #252526;
            --text: #e0e0e0;
            --muted: #9aa0a6;
            --border: #333;
            --primary: #2196F3;
            --accent: #4caf50;
            --warn: #FF9800;
            --bad: #f44336;
        }

        body {
            margin: 0;
            padding: 14px;
            min-height: 100vh;
            box-sizing: border-box;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        h1 {
            font-size: 1.2rem;
            margin: 6px 0 2px;
            font-weight: 600;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .drop {
            border: 2px dashed #444;
            border-radius: 12px;
            background: var(--panel);
            padding: 36px 20px;
            text-align: center;
            color: var(--muted);
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }

        .drop.hover {
            border-color: var(--primary);
            background: #20303d;
            color: #cfe6ff;
        }

        .drop .big {
            font-size: 1.05rem;
            color: var(--text);
            margin-bottom: 6px;
        }

        .drop .sub {
            font-size: 0.84rem;
        }

        input[type="file"] {
            display: none;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .fname {
            font-weight: 600;
            font-size: 1.0rem;
            word-break: break-all;
        }

        .bpm-big {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .bpm-big .unit {
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 400;
            margin-left: 4px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px 14px;
        }

        .stat {
            background: #1b1b1c;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
        }

        .stat .k {
            font-size: 0.72rem;
            color: var(--muted);
            margin-bottom: 3px;
        }

        .stat .v {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 1.0rem;
            color: var(--text);
        }

        .badge {
            font-size: 0.74rem;
            padding: 2px 8px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .badge.ok { background: rgba(76, 175, 80, 0.18); color: #8fe09a; }
        .badge.warn { background: rgba(255, 152, 0, 0.18); color: #ffce8a; }
        .badge.bad { background: rgba(244, 67, 54, 0.18); color: #ff9b91; }

        canvas {
            width: 100%;
            height: 120px;
            display: block;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .chart-cap {
            font-size: 0.76rem;
            color: var(--muted);
            margin-top: -4px;
        }

        .err {
            color: #ff9b91;
            font-size: 0.86rem;
        }

        .notes {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.6;
        }

        .clearbtn {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            align-self: flex-end;
        }

        .clearbtn:hover { background: #444; }

        .hints {
            font-size: 0.8rem;
            color: #6f6f6f;
            text-align: center;
            line-height: 1.7;
            max-width: 1100px;
        }
    </style>
</head>

<body>
    <h1>BPM 分析</h1>

    <div class="container">
        <label class="drop" id="drop">
            <div class="big">📂 把 Beat 文件拖进来,或点击选择</div>
            <div class="sub">支持节拍标注导出的 CSV(<code>TIME,LABEL</code>),可一次拖多个</div>
            <input type="file" id="fileInput" accept=".csv,text/csv" multiple />
        </label>

        <button class="clearbtn" id="clearBtn" style="display:none">清空结果</button>

        <div id="results"></div>
    </div>

    <div class="hints">
        BPM = 60 / 相邻拍点的时间间隔。手工标注会有抖动,所以同时给出中位数 / 均值 / 稳定度。
        瞬时 BPM 曲线用来看速度是否漂移或有突变。
    </div>

    <script>
        // @ts-nocheck
        const dropEl = document.getElementById('drop');
        const fileInput = document.getElementById('fileInput');
        const resultsEl = document.getElementById('results');
        const clearBtn = document.getElementById('clearBtn');

        // --- math helpers ---
        function median(arr) {
            if (!arr.length) return NaN;
            const a = [...arr].sort((x, y) => x - y);
            const m = a.length >> 1;
            return a.length % 2 ? a[m] : (a[m - 1] + a[m]) / 2;
        }
        function mean(arr) {
            if (!arr.length) return NaN;
            return arr.reduce((s, v) => s + v, 0) / arr.length;
        }
        function std(arr) {
            if (arr.length < 2) return 0;
            const m = mean(arr);
            return Math.sqrt(arr.reduce((s, v) => s + (v - m) * (v - m), 0) / (arr.length - 1));
        }

        // Parse a beat CSV. Returns { beats: [{time,label,beatIdx}], sections: [...] }
        function parseBeats(text) {
            const lines = text.split(/\r?\n/);
            const beats = [];
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                const parts = line.split(',');
                if (parts.length < 1) continue;
                const rawTime = parts[0].trim();
                const label = (parts[1] || '').trim();

                // skip header / section rows (non-numeric first column)
                const t = parseFloat(rawTime);
                if (isNaN(t)) continue;
                // require the numeric value to actually be the whole token (avoid "0:2" style)
                if (!/^-?\d+(\.\d+)?$/.test(rawTime)) continue;

                let beatIdx = null;
                const m = label.match(/^(\d+)\.(\d+)$/);
                if (m) beatIdx = parseInt(m[2], 10);
                beats.push({ time: t, label, beatIdx });
            }
            beats.sort((a, b) => a.time - b.time);
            return beats;
        }

        // Compute instantaneous BPM series and aggregate stats.
        function analyze(beats) {
            if (beats.length < 2) {
                return { ok: false, reason: '拍点不足(少于 2 个),无法计算 BPM' };
            }

            const intervals = [];
            const inst = []; // {time, bpm}
            for (let i = 1; i < beats.length; i++) {
                const dt = beats[i].time - beats[i - 1].time;
                if (dt <= 0) continue;
                intervals.push(dt);
                inst.push({ time: beats[i].time, bpm: 60 / dt });
            }
            if (!intervals.length) {
                return { ok: false, reason: '所有间隔为 0 或非递增,数据异常' };
            }

            const medDt = median(intervals);
            const meanDt = mean(intervals);
            const bpmMedian = 60 / medDt;
            const bpmMean = 60 / meanDt;

            const instBpms = inst.map(p => p.bpm);
            const bpmStd = std(instBpms);
            const cv = bpmStd / bpmMean; // coefficient of variation

            // detect beats per bar from labels
            let beatsPerBar = null;
            const idxs = beats.map(b => b.beatIdx).filter(v => v != null);
            if (idxs.length) beatsPerBar = Math.max(...idxs);

            const duration = beats[beats.length - 1].time - beats[0].time;

            // stability classification on coefficient of variation
            let stability;
            if (cv < 0.02) stability = { cls: 'ok', text: '稳定' };
            else if (cv < 0.06) stability = { cls: 'warn', text: '略有波动' };
            else stability = { cls: 'bad', text: '抖动较大' };

            return {
                ok: true,
                count: beats.length,
                duration,
                bpmMedian, bpmMean, bpmStd, cv,
                bpmMin: Math.min(...instBpms),
                bpmMax: Math.max(...instBpms),
                beatsPerBar,
                inst,
                stability,
            };
        }

        function fmt(n, d = 1) {
            return isFinite(n) ? n.toFixed(d) : '—';
        }
        function fmtTime(sec) {
            if (!isFinite(sec) || sec < 0) sec = 0;
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec - m * 60);
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function drawInst(canvas, inst, bpmMedian) {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            const w = Math.max(1, Math.floor(rect.width * dpr));
            const h = Math.max(1, Math.floor(rect.height * dpr));
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, w, h);

            if (inst.length < 2) return;

            const times = inst.map(p => p.time);
            const bpms = inst.map(p => p.bpm);
            const t0 = times[0], t1 = times[times.length - 1];
            // clip the y range around the median so a couple of outliers don't flatten it
            const lo = Math.min(bpmMedian * 0.85, Math.min(...bpms));
            const hi = Math.max(bpmMedian * 1.15, Math.max(...bpms));
            const padX = 8 * dpr, padY = 10 * dpr;

            const xOf = t => padX + (t1 > t0 ? (t - t0) / (t1 - t0) : 0) * (w - 2 * padX);
            const yOf = b => h - padY - ((b - lo) / Math.max(1e-6, hi - lo)) * (h - 2 * padY);

            // median guide line
            ctx.strokeStyle = 'rgba(76,175,80,0.5)';
            ctx.lineWidth = 1 * dpr;
            ctx.setLineDash([5 * dpr, 5 * dpr]);
            ctx.beginPath();
            ctx.moveTo(padX, yOf(bpmMedian));
            ctx.lineTo(w - padX, yOf(bpmMedian));
            ctx.stroke();
            ctx.setLineDash([]);

            // bpm curve
            ctx.strokeStyle = 'rgba(33,150,243,0.95)';
            ctx.lineWidth = 1.5 * dpr;
            ctx.beginPath();
            inst.forEach((p, i) => {
                const x = xOf(p.time), y = yOf(p.bpm);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // y labels
            ctx.fillStyle = 'rgba(180,180,180,0.7)';
            ctx.font = `${11 * dpr}px ui-monospace, monospace`;
            ctx.textBaseline = 'top';
            ctx.fillText(`${hi.toFixed(0)}`, 2 * dpr, 2 * dpr);
            ctx.textBaseline = 'bottom';
            ctx.fillText(`${lo.toFixed(0)}`, 2 * dpr, h - 2 * dpr);
        }

        function statHTML(k, v) {
            return `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`;
        }

        function renderCard(fileName, res) {
            const card = document.createElement('div');
            card.className = 'card';

            if (!res.ok) {
                card.innerHTML = `
                    <div class="card-head"><div class="fname">${fileName}</div></div>
                    <div class="err">⚠ ${res.reason}</div>`;
                return card;
            }

            const barText = res.beatsPerBar ? `${res.beatsPerBar} 拍/小节` : '未知(标签非「小节.拍」)';

            card.innerHTML = `
                <div class="card-head">
                    <div class="fname">${fileName}</div>
                    <div>
                        <span class="bpm-big">${fmt(res.bpmMedian, 1)}<span class="unit">BPM</span></span>
                        <span class="badge ${res.stability.cls}">${res.stability.text}</span>
                    </div>
                </div>
                <div class="stats">
                    ${statHTML('中位 BPM', fmt(res.bpmMedian, 2))}
                    ${statHTML('均值 BPM', fmt(res.bpmMean, 2))}
                    ${statHTML('BPM 范围', `${fmt(res.bpmMin, 1)} ~ ${fmt(res.bpmMax, 1)}`)}
                    ${statHTML('标准差', `±${fmt(res.bpmStd, 2)}`)}
                    ${statHTML('波动系数', `${fmt(res.cv * 100, 2)}%`)}
                    ${statHTML('拍点数', res.count)}
                    ${statHTML('节拍标注时长', fmtTime(res.duration))}
                    ${statHTML('拍号', barText)}
                </div>
                <canvas></canvas>
                <div class="chart-cap">瞬时 BPM 随时间变化(虚线 = 中位 BPM)</div>`;

            // draw after layout so canvas has width
            requestAnimationFrame(() => {
                const cv = card.querySelector('canvas');
                cv._inst = res.inst;
                cv._med = res.bpmMedian;
                drawInst(cv, res.inst, res.bpmMedian);
            });
            return card;
        }

        async function handleFiles(fileList) {
            const files = [...fileList].filter(f => /\.csv$/i.test(f.name) || f.type.includes('csv'));
            if (!files.length) return;

            clearBtn.style.display = 'block';

            for (const file of files) {
                let card;
                try {
                    const text = await file.text();
                    const beats = parseBeats(text);
                    card = renderCard(file.name, analyze(beats));
                } catch (e) {
                    card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<div class="card-head"><div class="fname">${file.name}</div></div>
                        <div class="err">⚠ 解析失败:${e && e.message ? e.message : e}</div>`;
                }
                resultsEl.appendChild(card);
            }
        }

        // --- events ---
        dropEl.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => {
            handleFiles(e.target.files);
            fileInput.value = '';
        });

        ['dragenter', 'dragover'].forEach(ev =>
            dropEl.addEventListener(ev, e => {
                e.preventDefault();
                dropEl.classList.add('hover');
            }));
        ['dragleave', 'drop'].forEach(ev =>
            dropEl.addEventListener(ev, e => {
                e.preventDefault();
                dropEl.classList.remove('hover');
            }));
        dropEl.addEventListener('drop', e => {
            if (e.dataTransfer && e.dataTransfer.files) handleFiles(e.dataTransfer.files);
        });

        // allow dropping anywhere on the page
        window.addEventListener('dragover', e => e.preventDefault());
        window.addEventListener('drop', e => {
            e.preventDefault();
            if (e.target.closest('#drop')) return; // handled above
            if (e.dataTransfer && e.dataTransfer.files) handleFiles(e.dataTransfer.files);
        });

        clearBtn.addEventListener('click', () => {
            resultsEl.innerHTML = '';
            clearBtn.style.display = 'none';
        });

        // redraw charts on resize
        let resizeTimer = 0;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                resultsEl.querySelectorAll('.card').forEach(card => {
                    const cv = card.querySelector('canvas');
                    if (cv && cv._inst) drawInst(cv, cv._inst, cv._med);
                });
            }, 120);
        });
    </script>
</body>

</html>
