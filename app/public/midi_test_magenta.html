<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MIDI 诊断 + magenta</title>
    <style>
        body { font-family: monospace; padding: 1rem; background: #1e1e1e; color: #ddd; }
        pre { white-space: pre-wrap; word-break: break-all; background: #000; padding: 0.5rem; }
        .ok { color: #4ade80; } .err { color: #f87171; } .info { color: #60a5fa; }
    </style>
</head>
<body>
    <h2>webview 诊断 — 加载 magenta + SoundFontPlayer 后 fetch</h2>
    <pre id="log"></pre>
    <script src="magentamusic.min.js"></script>
    <script>
        const logEl = document.getElementById('log');
        const log = (msg, cls = 'info') => {
            const line = document.createElement('div');
            line.className = cls;
            line.textContent = `[${new Date().toISOString().slice(11, 23)}] ${msg}`;
            logEl.appendChild(line);
            console.log(`[diag2] ${msg}`);
        };

        log('页面加载完成,magenta 脚本已 included');
        log('typeof mm = ' + typeof mm);

        window.addEventListener('error', (e) => {
            log('window.error: ' + (e.message || e), 'err');
        });
        window.addEventListener('unhandledrejection', (e) => {
            log('unhandled: ' + (e.reason && e.reason.message || e.reason), 'err');
        });

        let player;
        try {
            log('构造 mm.SoundFontPlayer("sgm_plus") ...');
            player = new mm.SoundFontPlayer('sgm_plus');
            log('SoundFontPlayer 构造完成', 'ok');
        } catch (err) {
            log('SoundFontPlayer 构造失败: ' + err, 'err');
        }

        // 等几个 tick 让 magenta 内部完成异步 init
        setTimeout(() => log('200ms 后,事件循环存活'), 200);
        setTimeout(() => log('500ms 后,事件循环存活'), 500);

        window.addEventListener('message', async (e) => {
            const msg = e.data;
            if (!msg || typeof msg !== 'object') return;
            if (msg.type !== 'load_midi_url') return;
            log('收到 url=' + msg.url);

            try {
                log('test1: fetch 开始');
                const r = await fetch(msg.url);
                log(`test1: resp ok=${r.ok} status=${r.status}`, 'ok');
                const buf = await r.arrayBuffer();
                log(`test1: arrayBuffer done, bytes=${buf.byteLength}`, 'ok');
            } catch (err) {
                log('test1 失败: ' + (err && err.stack || err), 'err');
            }

            try {
                log('test2: XHR 开始');
                await new Promise((res, rej) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', msg.url);
                    xhr.responseType = 'arraybuffer';
                    xhr.onload = () => {
                        log(`test2: XHR done, bytes=${xhr.response && xhr.response.byteLength}`, 'ok');
                        res();
                    };
                    xhr.onerror = () => { log('test2: XHR error', 'err'); rej(new Error('xhr err')); };
                    xhr.send();
                });
            } catch (err) {
                log('test2 失败: ' + err, 'err');
            }

            log('全部测试结束');
        });

        log('诊断脚本就绪,等待 host 发 load_midi_url');
    </script>
</body>
</html>
