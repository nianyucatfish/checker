<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MIDI 极简诊断</title>
    <style>
        body { font-family: monospace; padding: 1rem; background: #1e1e1e; color: #ddd; }
        pre { white-space: pre-wrap; word-break: break-all; background: #000; padding: 0.5rem; }
        .ok { color: #4ade80; } .err { color: #f87171; } .info { color: #60a5fa; }
    </style>
</head>
<body>
    <h2>webview 极简诊断 — 不加载 magenta</h2>
    <pre id="log"></pre>
    <script>
        const logEl = document.getElementById('log');
        const log = (msg, cls = 'info') => {
            const line = document.createElement('div');
            line.className = cls;
            line.textContent = `[${new Date().toISOString().slice(11, 23)}] ${msg}`;
            logEl.appendChild(line);
            console.log(`[diag] ${msg}`);
        };
        log('页面加载,location=' + location.href);

        // 全局错误
        window.addEventListener('error', (e) => {
            log('window.error: ' + (e.message || e), 'err');
        });
        window.addEventListener('unhandledrejection', (e) => {
            log('unhandled: ' + (e.reason && e.reason.message || e.reason), 'err');
        });

        // 收到 host 推来的 url,试不同方法读
        window.addEventListener('message', async (e) => {
            const msg = e.data;
            if (!msg || typeof msg !== 'object') return;
            if (msg.type !== 'load_midi_url') return;
            log('收到 url=' + msg.url);

            // 测试 1:fetch
            try {
                log('test1: fetch() 开始');
                const r = await fetch(msg.url);
                log(`test1: fetch resp ok=${r.ok} status=${r.status}`, 'ok');
                const buf = await r.arrayBuffer();
                log(`test1: arrayBuffer done, bytes=${buf.byteLength}`, 'ok');
            } catch (err) {
                log('test1 失败: ' + (err && err.stack || err), 'err');
            }

            // 测试 2:XHR
            try {
                log('test2: XHR 开始');
                await new Promise((res, rej) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', msg.url);
                    xhr.responseType = 'arraybuffer';
                    xhr.onload = () => {
                        log(`test2: XHR done, bytes=${xhr.response && xhr.response.byteLength}`, 'ok');
                        res();
                    };
                    xhr.onerror = () => { log('test2: XHR error', 'err'); rej(new Error('xhr err')); };
                    xhr.send();
                });
            } catch (err) {
                log('test2 失败: ' + err, 'err');
            }

            // 测试 3:同源 fetch 控制组
            try {
                log('test3: 同源 fetch /midi_test.html');
                const r2 = await fetch('/midi_test.html');
                log(`test3: ok=${r2.ok} status=${r2.status}`, 'ok');
            } catch (err) {
                log('test3 失败: ' + err, 'err');
            }

            log('全部测试结束');
        });

        log('诊断脚本就绪,等待 host 发 load_midi_url');
    </script>
</body>
</html>
