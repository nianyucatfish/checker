<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MIDI 诊断 — magenta 空转</title>
    <style>
        body { font-family: monospace; padding: 1rem; background: #1e1e1e; color: #ddd; }
        pre { white-space: pre-wrap; word-break: break-all; background: #000; padding: 0.5rem; }
        .ok { color: #4ade80; } .err { color: #f87171; } .info { color: #60a5fa; }
    </style>
</head>
<body>
    <h2>magenta 空转 — 不 fetch,只看 SoundFontPlayer 后是否会延迟自爆</h2>
    <pre id="log"></pre>
    <script src="magentamusic.min.js"></script>
    <script>
        const logEl = document.getElementById('log');
        const t0 = performance.now();
        const log = (msg, cls = 'info') => {
            const line = document.createElement('div');
            line.className = cls;
            line.textContent = `[+${(performance.now() - t0).toFixed(0)}ms] ${msg}`;
            logEl.appendChild(line);
            console.log(`[idle] +${(performance.now() - t0).toFixed(0)}ms ${msg}`);
        };

        log('页面就绪,typeof mm=' + typeof mm);

        window.addEventListener('error', (e) => log('window.error: ' + e.message, 'err'));
        window.addEventListener('unhandledrejection', (e) =>
            log('unhandled: ' + (e.reason && e.reason.message || e.reason), 'err'));

        let player;
        try {
            log('构造 SoundFontPlayer ...');
            player = new mm.SoundFontPlayer('sgm_plus');
            log('SoundFontPlayer 构造完成', 'ok');
        } catch (err) {
            log('构造失败: ' + err, 'err');
        }

        // 8 秒内每 500ms 一次心跳
        for (let i = 1; i <= 16; i++) {
            setTimeout(() => log(`heartbeat #${i}`), i * 500);
        }
        setTimeout(() => log('=== 8 秒空转结束,仍存活 ===', 'ok'), 8500);

        // 即使 host 推 url 也不响应,纯空转
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'load_midi_url') {
                log('收到 url(忽略,空转模式)');
            }
        });
    </script>
</body>
</html>
